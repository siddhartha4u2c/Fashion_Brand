<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 500" width="100%" height="100%" style="background-color: #F8FAFC; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Definitions for Gradients, Shadows, and Markers -->
  <defs>
    <!-- Soft Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06" />
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.04" />
    </filter>

    <!-- Node Gradients -->
    <linearGradient id="planner-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF" />
      <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>
    <linearGradient id="tool-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF5FF" />
      <stop offset="100%" stop-color="#E9D5FF" />
    </linearGradient>
    <linearGradient id="input-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF2F2" />
      <stop offset="100%" stop-color="#FEE2E2" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748B" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3B82F6" />
    </marker>
  </defs>

  <!-- BACKGROUND GRID (Subtle) -->
  <g opacity="0.03">
    <path d="M 0,50 L 740,50 M 0,100 L 740,100 M 0,150 L 740,150 M 0,200 L 740,200 M 0,250 L 740,250 M 0,300 L 740,300 M 0,350 L 740,350 M 0,400 L 740,400 M 0,450 L 740,450" stroke="#0F172A" stroke-width="1" />
    <path d="M 50,0 L 50,500 M 100,0 L 100,500 M 150,0 L 150,500 M 200,0 L 200,500 M 250,0 L 250,500 M 300,0 L 300,500 M 350,0 L 350,500 M 400,0 L 400,500 M 450,0 L 450,500 M 500,0 L 500,500 M 550,0 L 550,500 M 600,0 L 600,500 M 650,0 L 650,500 M 700,0 L 700,500" stroke="#0F172A" stroke-width="1" />
  </g>

  <!-- ================= INPUT BOX ================= -->
  <g transform="translate(270, 15)" filter="url(#shadow)">
    <rect width="240" height="80" rx="12" fill="url(#input-grad)" stroke="#F87171" stroke-width="1.5" />
    <text x="12" y="22" font-size="10" font-weight="800" fill="#991B1B" letter-spacing="1">INPUT</text>
    
    <!-- Topic Sub-Item -->
    <g transform="translate(15, 32)">
      <circle cx="16" cy="16" r="14" fill="#FFFFFF" stroke="#EF4444" stroke-width="1" />
      <!-- Lightbulb Icon -->
      <path d="M16 8a5 5 0 0 0-5 5c0 1.7.9 3.2 2.2 4.1.5.3.8.9.8 1.5v1a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-1c0-.6.3-1.2.8-1.5A5 5 0 0 0 16 8zm-2 16h4v-1h-4v1z" fill="#EF4444" />
      <text x="36" y="20" font-size="11" font-weight="700" fill="#1E293B">Topic</text>
    </g>

    <!-- Default Template Sub-Item -->
    <g transform="translate(115, 32)">
      <rect x="2" y="2" width="24" height="28" rx="4" fill="#FFFFFF" stroke="#EF4444" stroke-width="1" />
      <!-- Doc Lines -->
      <line x1="8" y1="10" x2="20" y2="10" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" />
      <line x1="8" y1="16" x2="20" y2="16" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" />
      <line x1="8" y1="22" x2="16" y2="22" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" />
      <text x="36" y="20" font-size="11" font-weight="700" fill="#1E293B">Template</text>
    </g>
  </g>

  <!-- ================= REPORT PLANNER ================= -->
  <g transform="translate(280, 135)" filter="url(#shadow)">
    <rect width="220" height="90" rx="12" fill="url(#planner-grad)" stroke="#3B82F6" stroke-width="2" />
    <!-- OpenAI Logo -->
    <g transform="translate(15, 25)" color="#1E3A8A">
      <path d="M24 16.2c.3-.6.5-1.2.5-1.9 0-2-1.6-3.6-3.6-3.6-.9 0-1.6.3-2.2.9-.2-.7-.8-1.3-1.5-1.7-1.4-.8-3.2-.8-4.6 0-.7.4-1.3 1-1.5 1.7-.6-.6-1.4-.9-2.2-.9-2 0-3.6 1.6-3.6 3.6 0 .7.2 1.4.6 1.9-.6.3-1 .8-1.4 1.4-.8 1.4-.8 3.2 0 4.6.3.6.8 1.1 1.4 1.4-.3.6-.6 1.2-.6 1.9 0 2 1.6 3.6 3.6 3.6.9 0 1.6-.3 2.2-.9.2.7.8 1.3 1.5 1.7.8.4 1.6.6 2.5.6.8 0 1.6-.2 2.2-.6.7-.4 1.3-1 1.5-1.7.6.6 1.4.9 2.2.9 2 0 3.6-1.6 3.6-3.6 0-.7-.2-1.4-.6-1.9.6-.3 1-.8 1.4-1.4.8-1.4.8-3.2 0-4.6-.3-.6-.8-1.1-1.4-1.4zm-7.4 7.5c-.5.2-1 .4-1.5.4-1.2 0-2.2-.8-2.6-1.8l.1-.1 4.3-2.5c.2-.1.4-.4.4-.7v-5l1.5.9c.7.4 1.1 1.2 1.1 2v5c.1.9-.5 1.6-1.3 1.9zm-5.5-1.5l-4.3-2.5c-.7-.4-1.1-1.2-1.1-2v-5c0-.9.5-1.6 1.3-2 .5-.2 1-.4 1.5-.4 1.2 0 2.2.8 2.6 1.8v5c0 .2-.1.5-.4.6l-4.3 2.5c.1 0 .4 0 .5 0zm-.7-10.7c.5-.2 1-.4 1.5-.4 1.2 0 2.2.8 2.6 1.8l-.1.1-4.3 2.5c-.2.1-.4.4-.4.7v5l-1.5-.9c-.7-.4-1.1-1.2-1.1-2v-5c0-.9.5-1.6 1.3-2zm9.8 3l-1.5-.9c-.7-.4-1.1-1.2-1.1-2v-5c0-.9.5-1.6 1.3-2 .5-.2 1-.4 1.5-.4 1.2 0 2.2.8 2.6 1.8v5c0 .2-.1.5-.4.6l-4.3 2.5c.2 0 .3 0 .4 0zm3 7.7l-4.3 2.5c-.2.1-.5.1-.6 0l-4.3-2.5v-5c0-.2.1-.5.4-.6l4.3-2.5c.2-.1.5-.1.6 0l4.3 2.5v5c0 .2-.1.5-.4.6zm-1.4-10.7l4.3 2.5c.7.4 1.1 1.2 1.1 2v5c0 .9-.5 1.6-1.3 2-.5.2-1 .4-1.5 .4-1.2 0-2.2-.8-2.6-1.8v-5c0-.2.1-.5.4-.6l4.3-2.5z" fill="currentColor"/>
    </g>
    <text x="60" y="38" font-size="11" font-weight="700" fill="#2563EB">OpenAI GPT-4o</text>
    <text x="60" y="60" font-size="14" font-weight="800" fill="#1E3A8A" letter-spacing="0.5">REPORT PLANNER</text>
  </g>

  <!-- ================= WEB SEARCH TOOL ================= -->
  <g transform="translate(530, 150)" filter="url(#shadow)">
    <rect width="110" height="60" rx="12" fill="url(#tool-grad)" stroke="#8B5CF6" stroke-width="1.5" />
    <!-- Search / Globe Icon -->
    <path d="M24 16a8 8 0 1 0 0 16 8 8 0 0 0 0-16zm-7 8c0-3.3 2.7-6 6-6s6 2.7 6 6-2.7 6-6 6-6-2.7-6-6zm11 4.5l3.5 3.5-1.5 1.5-3.5-3.5 1.5-1.5z" fill="#6B21A8" transform="translate(-10, -10)" opacity="0.3" />
    <path d="M17.5 12.5a5 5 0 1 1-5 5 5 5 0 0 1 5-5zm0 1a4 4 0 1 0 4 4 4 4 0 0 0-4-4zm4 6.5l2.5 2.5-1 1-2.5-2.5 1-1z" fill="#6B21A8" transform="translate(10, 5)" />
    <text x="12" y="42" font-size="10" font-weight="800" fill="#6B21A8" letter-spacing="0.5">WEB SEARCH</text>
  </g>

  <!-- ================= REPORT TEMPLATE WITH CUSTOM SECTIONS ================= -->
  <g transform="translate(20, 110)">
    <!-- Main Yellow Border Box -->
    <rect width="230" height="360" rx="12" fill="#FEFDF0" stroke="#EAB308" stroke-dasharray="6,4" stroke-width="2" filter="url(#shadow)" />
    
    <!-- Large Template Icon -->
    <g transform="translate(90, 20)" fill="none" stroke="#854D0E" stroke-width="2">
      <rect x="0" y="0" width="45" height="55" rx="4" fill="#FEF9C3" />
      <line x1="8" y1="12" x2="37" y2="12" stroke-width="3" />
      <line x1="8" y1="24" x2="37" y2="24" stroke-width="3" />
      <line x1="8" y1="36" x2="25" y2="36" stroke-width="3" />
    </g>

    <text x="115" y="95" font-size="10" font-weight="800" fill="#854D0E" text-anchor="middle" letter-spacing="0.5">REPORT TEMPLATE</text>
    <text x="115" y="110" font-size="9" font-weight="700" fill="#A16207" text-anchor="middle" letter-spacing="0.5">WITH CUSTOM SECTIONS</text>

    <!-- SECTION ITEMS -->
    <!-- Introduction (Orange hex/pill shape) -->
    <g transform="translate(15, 130)">
      <rect width="200" height="35" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5" />
      <text x="15" y="21" font-size="10" font-weight="700" fill="#C2410C">INTRODUCTION</text>
    </g>

    <!-- Section 1 (Green hex/pill shape) -->
    <g transform="translate(15, 175)">
      <rect width="200" height="35" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" />
      <text x="15" y="21" font-size="10" font-weight="700" fill="#15803D">SECTION 1</text>
    </g>

    <!-- Section 2 (Green hex/pill shape) -->
    <g transform="translate(15, 220)">
      <rect width="200" height="35" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" />
      <text x="15" y="21" font-size="10" font-weight="700" fill="#15803D">SECTION 2</text>
    </g>

    <!-- Dot Dot Dot -->
    <text x="115" y="280" font-size="20" font-weight="800" fill="#94A3B8" text-anchor="middle">. . .</text>

    <!-- Conclusion (Orange hex/pill shape) -->
    <g transform="translate(15, 305)">
      <rect width="200" height="35" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5" />
      <text x="15" y="21" font-size="10" font-weight="700" fill="#C2410C">CONCLUSION</text>
    </g>
  </g>

  <!-- ==================== FLOW CONNECTORS ==================== -->

  <!-- Input to Report Planner -->
  <path d="M 390,95 L 390,127" fill="none" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow-gray)" />

  <!-- Report Planner <-> Web Search Tool -->
  <path d="M 500,180 L 522,180" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <path d="M 530,180 L 508,180" fill="none" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow-gray)" />

  <!-- Report Planner -> Custom Sections Template -->
  <!-- Clean right-angle downward and leftward path matching the design layout -->
  <path d="M 280,180 L 260,180 L 260,130 L 252,130" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)" />

</svg>
